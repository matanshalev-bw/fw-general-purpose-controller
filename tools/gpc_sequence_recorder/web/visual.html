<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPC Visual Recorder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.60/dist/drawflow.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: #252526;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .actions { display: flex; gap: 0.5rem; align-items: center; }
    .actions a {
      color: #9cdcfe;
      text-decoration: none;
      font-size: 0.85rem;
      margin-right: 0.5rem;
    }
    .actions a:hover { text-decoration: underline; }
    .actions button {
      padding: 0.35rem 0.75rem;
      background: #0e639c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .actions button:hover { background: #1177bb; }
    .actions button.secondary { background: #555; }
    .actions button.secondary:hover { background: #666; }
    .actions button.flash { background: #388a34; }
    .actions button.flash:hover { background: #46a042; }
    .actions button:disabled { opacity: 0.45; cursor: not-allowed; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      padding: 0.75rem;
      gap: 0.75rem;
    }

    .section {
      border: 2px solid #444;
      border-radius: 8px;
      background: #222;
      padding: 0.6rem 0.75rem;
    }
    .section-title {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .section-live { border-color: #3d8f4a; }
    .section-live .section-title { color: #6fcf7f; }
    .section-bank { border-color: #c47a2c; }
    .section-bank .section-title { color: #f0a050; }

    .live-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
      font-size: 0.85rem;
    }
    .live-row label { color: #aaa; }
    .live-row select, .live-row input {
      background: #3c3c3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 0.25rem 0.4rem;
      font-size: 0.85rem;
    }
    .live-row button.send { background: #388a34; }
    .live-row button.send:hover { background: #46a042; }
    #live-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.75rem;
      align-items: center;
    }
    #live-fields .field { display: flex; align-items: center; gap: 0.25rem; }
    #live-fields .field label { font-size: 0.8rem; color: #bbb; }
    #live-fields input { width: 5rem; }
    #live-fields input.wide { width: 12rem; }

    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .palette-item {
      min-width: 5.5rem;
      padding: 0.45rem 0.6rem;
      border: 2px solid #c47a2c;
      border-radius: 6px;
      background: #2d2a26;
      color: #f0d0a0;
      font-size: 0.78rem;
      text-align: center;
      cursor: grab;
      user-select: none;
    }
    .palette-item.node-if-shape {
      transform: rotate(0deg);
      border-radius: 4px;
      border-color: #d4a84b;
      background: #3a3020;
    }
    .palette-item:active { cursor: grabbing; }

    .board-legend {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      font-size: 0.75rem;
      color: #999;
      padding: 0.1rem 0.2rem;
    }
    .board-legend .legend-item { display: flex; align-items: center; gap: 0.4rem; }

    .board {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1.3fr;
      grid-template-rows: auto auto auto auto auto auto;
      grid-template-areas:
        "powerup   manual   manual   error"
        "main      init     diseng   error"
        "main      engaged  engaged  error"
        "main      pubit    pubit    emergency"
        "main      oper     oper     emergency"
        "telemetry telemetry command command";
      gap: 0.7rem 1rem;
      min-height: 42rem;
      align-items: stretch;
    }
    .board-zone {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-content: flex-start;
    }
    .board-zone.zone-command { grid-area: command; }
    .board-zone.zone-telemetry { grid-area: telemetry; }
    .board-zone > .state-card,
    .board-zone > .add-card {
      flex: 1 1 13rem;
      min-width: 12rem;
    }
    @media (max-width: 900px) {
      .board {
        grid-template-columns: 1fr;
        grid-template-areas:
          "powerup" "main"
          "manual" "init" "diseng" "engaged" "pubit" "oper"
          "error" "emergency"
          "telemetry" "command";
      }
    }

    .state-card {
      position: relative;
      overflow: visible;
      border: 2px solid #4a6fa5;
      border-radius: 8px;
      background: #1e2838;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      min-height: 6rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .state-arrow {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      background: #1a1a1a;
      border: 1.5px solid currentColor;
      pointer-events: none;
    }
    .state-arrow.loop { color: #5fcf7f; }
    .state-arrow.once { color: #6a9fd5; }
    /* repeatable states: loop badge on the right edge; transition states: arrow on the bottom edge */
    .state-card .state-arrow {
      position: absolute;
      z-index: 5;
    }
    .state-card .state-arrow.loop {
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
    }
    .state-card .state-arrow.once {
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
    }
    .state-card .state-arrow.once.arrow-up {
      top: -14px;
      bottom: auto;
    }
    .state-card:hover {
      border-color: #6a9fd5;
      background: #243040;
    }
    .state-card.has-steps { border-color: #5a9e6a; }
    .state-card .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .state-card .card-meta {
      font-size: 0.72rem;
      color: #888;
      flex: 1;
    }
    .state-card .card-preview {
      font-size: 0.7rem;
      color: #aaa;
      font-family: Consolas, Monaco, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .state-card.type-command { border-color: #7a5a9a; background: #281e34; }
    .state-card.type-telemetry { border-color: #5a8a9a; background: #1e2a30; }
    .state-card.type-main { border-color: #6a7a9a; }
    .state-card.type-powerup { border-color: #6a9a6a; }

    .add-card {
      border: 2px dashed #555;
      border-radius: 8px;
      background: transparent;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 6.5rem;
    }
    .add-card:hover { border-color: #888; color: #bbb; }

    footer {
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      background: #252526;
      border-top: 1px solid #333;
      color: #888;
      flex-shrink: 0;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      display: flex;
      flex-direction: column;
      width: min(96vw, 72rem);
      height: min(92vh, 48rem);
      background: #252526;
      border: 1px solid #555;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #444;
      background: #2d2d30;
      flex-shrink: 0;
    }
    .modal-header h2 { margin: 0; flex: 1; font-size: 1rem; }
    .modal-header button {
      padding: 0.3rem 0.65rem;
      background: #555;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .modal-header button.primary { background: #0e639c; }
    .modal-header button:hover { background: #666; }
    .modal-header button.primary:hover { background: #1177bb; }

    .modal-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .modal-sidebar {
      width: 14rem;
      border-right: 1px solid #444;
      padding: 0.5rem;
      overflow: auto;
      flex-shrink: 0;
    }
    .modal-sidebar .palette-item {
      width: 100%;
      margin-bottom: 0.4rem;
      font-size: 0.72rem;
    }
    #drawflow {
      flex: 1;
      min-height: 0;
      background: #1a1a1a;
      background-image:
        linear-gradient(#2a2a2a 1px, transparent 1px),
        linear-gradient(90deg, #2a2a2a 1px, transparent 1px);
      background-size: 20px 20px;
    }
    #drawflow .drawflow-node {
      background: #2d3a4a;
      border: 2px solid #5a8fd5;
      border-radius: 6px;
      min-width: 9rem;
      color: #e0e0e0;
      font-size: 0.75rem;
    }
    #drawflow .drawflow-node.node-if {
      border-color: #d4a84b;
      background: #3a3020;
      transform: rotate(0deg);
    }
    #drawflow .drawflow-node.node-end {
      border-color: #888;
      background: #333;
      min-width: 5rem;
    }
    #drawflow .drawflow-node.selected { border-color: #9cdcfe; }
    #drawflow .drawflow-node .node-label {
      padding: 0.35rem 0.5rem;
      pointer-events: none;
    }

    .props-panel {
      width: 16rem;
      border-left: 1px solid #444;
      padding: 0.5rem 0.65rem;
      overflow: auto;
      flex-shrink: 0;
      font-size: 0.8rem;
    }
    .props-panel h3 {
      margin: 0 0 0.5rem;
      font-size: 0.85rem;
      color: #9cdcfe;
    }
    .props-panel .field {
      margin-bottom: 0.45rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .props-panel label { color: #aaa; font-size: 0.75rem; }
    .props-panel input, .props-panel select {
      background: #3c3c3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 0.25rem 0.4rem;
      font-size: 0.8rem;
    }
    .props-empty { color: #666; font-style: italic; }

    .bind-form {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 28rem;
    }
    .bind-form .field {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .bind-form label { color: #aaa; font-size: 0.8rem; }
    .bind-form input, .bind-form select {
      background: #3c3c3c;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 0.3rem 0.45rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>GPC Visual Recorder</h1>
    <div class="actions">
      <a href="/">Terminal UI</a>
      <button id="btn-load" type="button" class="secondary">Load</button>
      <button id="btn-export" type="button">Export</button>
      <button id="btn-flash" type="button" class="flash">Flash</button>
    </div>
  </header>

  <main>
    <section class="section section-live" id="live-section">
      <p class="section-title">Live</p>
      <div class="live-row">
        <label for="live-port">USB port</label>
        <select id="live-port"></select>
        <button type="button" id="btn-live-refresh" class="secondary">Refresh</button>
        <button type="button" id="btn-live-open">Open</button>
        <button type="button" id="btn-live-close" class="secondary" disabled>Close</button>
        <span id="live-status">Closed</span>
      </div>
      <div class="live-row">
        <label for="live-micro">Micro command</label>
        <select id="live-micro"></select>
        <div id="live-fields"></div>
        <button type="button" id="btn-live-send" class="send" disabled>Send now</button>
      </div>
    </section>

    <section class="section section-bank">
      <p class="section-title">Micro Commands Bank</p>
      <div class="palette" id="palette-bank"></div>
    </section>

    <div class="board-legend">
      <span class="legend-item"><span class="state-arrow loop">&#8635;</span> repeatable state (runs every tick while active)</span>
      <span class="legend-item"><span class="state-arrow once">&#8595;</span> transition state (runs once on entry)</span>
    </div>
    <div class="board" id="state-board"></div>
  </main>

  <footer>
    <span id="status">Ready</span>
  </footer>

  <div id="editor-modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Sequence editor</h2>
        <button type="button" id="btn-modal-save" class="primary">Save</button>
        <button type="button" id="btn-modal-close">Close</button>
      </div>
      <div class="modal-body">
        <div class="modal-sidebar" id="modal-palette"></div>
        <div id="drawflow"></div>
        <div class="props-panel" id="props-panel">
          <h3>Properties</h3>
          <p class="props-empty">Select a node to edit parameters.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="bind-modal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" style="height: auto; max-height: 80vh;">
      <div class="modal-header">
        <h2 id="bind-modal-title">Add binding</h2>
        <button type="button" id="btn-bind-save" class="primary">Add</button>
        <button type="button" id="btn-bind-close">Cancel</button>
      </div>
      <div class="bind-form" id="bind-form"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.60/dist/drawflow.min.js"></script>
  <script src="/visual.js"></script>
</body>
</html>
