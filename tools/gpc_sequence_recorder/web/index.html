<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPC Sequence Recorder</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: #252526;
      border-bottom: 1px solid #333;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .actions button {
      margin-left: 0.5rem;
      padding: 0.35rem 0.75rem;
      background: #0e639c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .actions button:hover { background: #1177bb; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      min-height: 0;
    }
    .panel:last-child { border-right: none; }
    .panel h2 {
      margin: 0;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      background: #2d2d30;
      border-bottom: 1px solid #333;
    }
    #terminal { flex: 1; padding: 4px; min-height: 0; }
    #preview {
      flex: 1;
      margin: 0;
      padding: 0.75rem;
      overflow: auto;
      font-family: "Consolas", "Monaco", monospace;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
      white-space: pre;
    }
    footer {
      display: flex;
      gap: 1rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      background: #252526;
      border-top: 1px solid #333;
      color: #888;
    }
    #bindings-list {
      flex: 1;
      color: #aaa;
    }
    #bindings-list span {
      margin-right: 0.75rem;
    }
    #bindings-list .recording { color: #dcdcaa; }
  </style>
</head>
<body>
  <header>
    <h1>GPC Sequence Recorder</h1>
    <div class="actions">
      <button id="btn-export" type="button">Export</button>
      <button id="btn-help" type="button">Help</button>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2>Terminal</h2>
      <div id="terminal"></div>
    </section>
    <section class="panel">
      <h2>HPP Preview</h2>
      <pre id="preview">// Type commands in the terminal to build a config.</pre>
    </section>
  </main>
  <footer>
    <div id="bindings-list">Bindings: none</div>
    <div id="status">Ready</div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
